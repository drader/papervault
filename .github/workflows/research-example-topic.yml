name: Research — Example Topic

on:
  schedule:
    - cron: '0 6 * * 2-5'   # Tue–Fri 09:00 Istanbul
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name  "papervault-bot"
          git config user.email "papervault-bot@users.noreply.github.com"

      - name: Run research
        env:
          LLM_PROVIDER:   ${{ secrets.LLM_PROVIDER }}
          LLM_API_KEY:    ${{ secrets.LLM_API_KEY }}
          LLM_MODEL:      ${{ secrets.LLM_MODEL }}
          RESEARCH_TOPIC: example-topic
        run: npx tsx src/research/index.ts
